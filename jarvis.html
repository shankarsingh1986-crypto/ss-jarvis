<style>
:root{--bg:#04070f;--p:#0d1420;--p2:#121d2e;--p3:#1a2640;--bd:#1e3a5f;--bd2:#0a4080;--ac:#00d4ff;--ac2:#0099cc;--go:#f5c518;--go2:#c49a10;--gn:#00e676;--gn2:#00994d;--rd:#ff3b3b;--or:#ff8c00;--pu:#9b72cf;--tx:#ddeeff;--tx2:#7aaccf;--tx3:#3d6a8a;--gw:0 0 25px rgba(0,212,255,.25);--gg:0 0 25px rgba(245,197,24,.2)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,100,255,.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,255,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
/* LOGIN */
#ls{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lb{background:var(--p);border:1px solid var(--ac);border-radius:20px;padding:52px 44px;width:360px;text-align:center;box-shadow:var(--gw),0 0 80px rgba(0,212,255,.08),inset 0 1px 0 rgba(255,255,255,.05)}
.lb-logo{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;color:var(--ac);letter-spacing:5px;margin-bottom:6px;text-shadow:var(--gw)}
.lb-sub{font-size:.7rem;color:var(--tx3);letter-spacing:4px;text-transform:uppercase;margin-bottom:32px}
.lb input{width:100%;padding:14px 18px;background:rgba(0,0,0,.4);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:1.1rem;letter-spacing:5px;text-align:center;outline:none;margin-bottom:14px;transition:all .3s}
.lb input:focus{border-color:var(--ac);box-shadow:0 0 15px rgba(0,212,255,.2)}
.lb-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--ac2),var(--ac));border:none;border-radius:10px;color:#000;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s}
.lb-btn:hover{transform:translateY(-2px);box-shadow:var(--gw)}
.lb-err{color:var(--rd);font-size:.82rem;margin-top:10px;display:none}
/* APP */
#app{display:none;position:relative;z-index:1;height:100vh}
/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:200;height:54px;background:rgba(4,7,15,.95);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 18px;backdrop-filter:blur(20px)}
.tb-logo{font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:900;color:var(--ac);letter-spacing:3px;text-shadow:var(--gw)}
.tb-r{display:flex;gap:14px;align-items:center}
.tb-time{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--tx2)}
.tb-nw{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--go);font-weight:500}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(4,7,15,.97);border-top:1px solid var(--bd);display:flex;overflow-x:auto;backdrop-filter:blur(20px)}
.nav::-webkit-scrollbar{display:none}
.ni{flex:0 0 auto;padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;color:var(--tx3);font-family:'Rajdhani',sans-serif;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;min-width:58px;transition:all .2s;border-top:2px solid transparent}
.ni.a{color:var(--ac);border-top-color:var(--ac)}
.ni-ic{font-size:1.15rem}
/* CONTENT */
.ct{padding:64px 14px 76px;max-width:980px;margin:0 auto}
.sc{display:none}.sc.a{display:block}
/* CARDS */
.card{background:var(--p);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:12px;position:relative}
.card-glow{border-color:var(--ac);box-shadow:var(--gw)}
.card-gold{border-color:var(--go);box-shadow:var(--gg)}
.ctitle{font-family:'Orbitron',sans-serif;font-size:.62rem;font-weight:700;color:var(--ac);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
/* QUOTE CARD */
.qcard{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(155,114,207,.06));border:1px solid rgba(0,212,255,.25);border-radius:16px;padding:22px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.qcard::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(0,212,255,.04) 0%,transparent 60%);pointer-events:none}
.qtext{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:500;color:var(--tx);line-height:1.6;font-style:italic}
.qauthor{font-size:.72rem;color:var(--tx3);letter-spacing:2px;margin-top:8px}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
/* KPI */
.kpi{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--ac);box-shadow:0 0 15px rgba(0,212,255,.1)}
.kl{font-size:.58rem;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.kv{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:500}
.kv.go{color:var(--go)}.kv.gn{color:var(--gn)}.kv.rd{color:var(--rd)}.kv.ac{color:var(--ac)}.kv.or{color:var(--or)}.kv.pu{color:var(--pu)}
/* PROGRESS */
.pb{height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac2),var(--ac));transition:width .6s cubic-bezier(.4,0,.2,1)}
.pf.w{background:linear-gradient(90deg,var(--or),#ffcc00)}.pf.d{background:linear-gradient(90deg,#990000,var(--rd))}
.pf.gn{background:linear-gradient(90deg,var(--gn2),var(--gn))}
/* FORMS */
label{font-size:.68rem;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 12px;background:rgba(0,0,0,.35);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;transition:all .2s}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 10px rgba(0,212,255,.15)}
select option{background:var(--p2)}
.fr{display:grid;gap:8px;margin-bottom:10px}
.fr.c2{grid-template-columns:1fr 1fr}.fr.c3{grid-template-columns:1fr 1fr 1fr}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:9px;border:none;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.85rem;letter-spacing:1px;cursor:pointer;transition:all .25s;white-space:nowrap}
.bp{background:linear-gradient(135deg,var(--ac2),var(--ac));color:#000}
.bp:hover{transform:translateY(-1px);box-shadow:var(--gw)}
.bs2{background:linear-gradient(135deg,var(--gn2),var(--gn));color:#000}
.bd2{background:var(--rd);color:#fff}
.bd2:hover{background:#cc2222}
.bg2{background:transparent;border:1px solid var(--bd);color:var(--tx2)}
.bg2:hover{border-color:var(--ac);color:var(--ac)}
.bgd{background:linear-gradient(135deg,var(--go2),var(--go));color:#000}
.bor{background:var(--or);color:#000}
.bsm{padding:5px 11px;font-size:.75rem}.bxs{padding:3px 8px;font-size:.68rem}
/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{padding:8px 8px;text-align:left;font-family:'Orbitron',sans-serif;font-size:.52rem;color:var(--tx3);letter-spacing:2px;border-bottom:1px solid var(--bd);white-space:nowrap}
.tbl td{padding:9px 8px;border-bottom:1px solid rgba(30,58,95,.35);vertical-align:middle}
.tbl tr:hover td{background:rgba(0,212,255,.025)}
/* TEXT */
.mono{font-family:'JetBrains Mono',monospace}
.tg{color:var(--gn)}.tr2c{color:var(--rd)}.to{color:var(--or)}.ta{color:var(--ac)}.tgo{color:var(--go)}.tp{color:var(--pu)}
.txs{font-size:.8rem;color:var(--tx3)}.txm{font-size:.9rem}
.tar{text-align:right}.tac{text-align:center}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.5px}
.b-gn{background:rgba(0,230,118,.15);color:var(--gn)}.b-rd{background:rgba(255,59,59,.15);color:var(--rd)}
.b-or{background:rgba(255,140,0,.15);color:var(--or)}.b-ac{background:rgba(0,212,255,.15);color:var(--ac)}
.b-go{background:rgba(245,197,24,.15);color:var(--go)}.b-pu{background:rgba(155,114,207,.15);color:var(--pu)}
/* LAYOUT */
.fb{display:flex;align-items:center;gap:8px}.fbt{display:flex;align-items:center;justify-content:space-between}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.wf{width:100%}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.shdr h2{font-family:'Orbitron',sans-serif;font-size:.78rem;color:var(--ac);letter-spacing:3px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 15px;border-radius:7px;border:none;background:var(--p2);color:var(--tx3);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.a{background:rgba(0,212,255,.12);color:var(--ac);border:1px solid rgba(0,212,255,.3)}
/* NET WORTH HERO */
.nw-hero{background:linear-gradient(135deg,rgba(245,197,24,.08),rgba(0,212,255,.06));border:1px solid rgba(245,197,24,.3);border-radius:16px;padding:20px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.nw-hero::after{content:'NET WORTH';position:absolute;right:18px;bottom:10px;font-family:'Orbitron',sans-serif;font-size:4rem;font-weight:900;color:rgba(245,197,24,.04);letter-spacing:2px}
.nw-label{font-size:.6rem;color:var(--tx3);letter-spacing:4px;margin-bottom:6px}
.nw-val{font-family:'JetBrains Mono',monospace;font-size:2.2rem;font-weight:500;color:var(--go)}
/* BALANCE SHEET */
.bs-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.35)}
.bs-row:last-child{border-bottom:none}
.bs-tot{display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-family:'JetBrains Mono',monospace;border-top:1px solid var(--bd)}
/* TIMELINE */
.tl{position:relative;padding-left:30px}
.tl::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--ac),var(--pu),var(--go))}
.tli{position:relative;margin-bottom:14px}
.tld{position:absolute;left:-23px;top:8px;width:12px;height:12px;border-radius:50%;border:2px solid var(--ac);background:var(--bg);transition:all .3s}
.tld.dn{background:var(--gn);border-color:var(--gn);box-shadow:0 0 10px rgba(0,230,118,.4)}
.tld.ip{background:var(--ac);border-color:var(--ac);box-shadow:var(--gw)}
/* MILESTONE */
.ms-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(30,58,95,.25)}
.ms-item:last-child{border-bottom:none}
.ms-check{width:18px;height:18px;border-radius:4px;border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.ms-check.done{background:var(--gn);border-color:var(--gn)}
/* MODAL */
.mo{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
.mo.o{display:flex}
.md{background:var(--p);border:1px solid var(--ac);border-radius:16px;padding:24px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:var(--gw)}
.md-t{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--ac);letter-spacing:3px;margin-bottom:18px}
.md-f{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
/* NOTIF */
.notif{position:fixed;top:64px;right:14px;z-index:1500;background:var(--p);border:1px solid var(--gn);border-radius:10px;padding:11px 16px;font-size:.82rem;color:var(--gn);transform:translateX(130%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.notif.sh{transform:translateX(0)}.notif.er{border-color:var(--rd);color:var(--rd)}
/* MISC */
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.htog{width:44px;height:24px;border-radius:12px;border:1px solid var(--bd);background:rgba(0,0,0,.4);position:relative;cursor:pointer;transition:all .3s}
.htog.on{background:var(--gn2);border-color:var(--gn)}
.htog::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.htog.on::after{transform:translateX(20px)}
.inp-sm{padding:4px 7px;font-size:.78rem;width:90px;text-align:right}
.empty{text-align:center;padding:28px;color:var(--tx3);font-size:.85rem}
.crow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(30,58,95,.3)}
.crow:last-child{border-bottom:none}
.goal-card{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:14px;transition:all .2s}

.dcard{background:var(--p2);border:1px solid var(--bd);border-radius:10px;padding:14px}
.loan-card{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px}
.sparkline{display:flex;align-items:flex-end;gap:3px;height:32px}
.spark-bar{border-radius:2px 2px 0 0;min-width:8px;transition:all .3s}
.rating-stars{display:flex;gap:4px}
.star{font-size:1.2rem;cursor:pointer;transition:all .2s}
.view-all-btn{display:block;text-align:center;padding:8px;color:var(--ac);font-size:.78rem;letter-spacing:1px;cursor:pointer;border-top:1px solid var(--bd);margin-top:8px;transition:all .2s}

.alert-banner{background:rgba(255,140,0,.08);border:1px solid var(--or);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:.82rem}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr}.fr.c3{grid-template-columns:1fr 1fr}}

.idx-hero{background:linear-gradient(135deg,rgba(155,114,207,.08),rgba(0,212,255,.05));border:1px solid rgba(155,114,207,.3);border-radius:14px;padding:16px;margin-bottom:12px}
.sm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.smk{background:var(--p2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.smk-l{font-size:.58rem;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}

.cal-day.na{background:rgba(255,255,255,.03);color:var(--tx3)}
</style>
</head>

let D={};
const sv=()=>localStorage.setItem('ssjv3',JSON.stringify(D));
function ld(){
try{const s=localStorage.getItem('ssjv3');D=s?JSON.parse(s):JSON.parse(JSON.stringify(DEF));}
catch{D=JSON.parse(JSON.stringify(DEF));}
if(!D.s101?.steps?.length)genSteps();
if(!D.logs)D.logs={D1:[],D2:[],D3:[],D4:[]};
if(!D.idx)D.idx={cap:25000,log:[]};
if(!D.wl)D.wl=[];
if(!D.loansGiven)D.loansGiven=[];
if(!D.accounts)D.accounts=DEF.accounts;
if(!D.tasks)D.tasks=DEF.tasks;
if(!D.reviews)D.reviews={};
if(!D.quotes)D.quotes=DEF.quotes;
if(!D.profile)D.profile=DEF.profile;
resetTasksIfNewDay();
resetHabitsIfNewDay();
}
function resetTasksIfNewDay(){const t=td();(D.tasks||[]).forEach(task=>{if(task.freq==='daily'&&task.lastDone!==t)task.done=false;if(task.freq==='weekly'){const dow=new Date().getDay();if(parseInt(task.day||0)===dow&&task.lastDone!==t)task.done=false;else if(parseInt(task.day||0)!==dow)task.done=false;}if(task.freq==='monthly'){const dom=new Date().getDate();if(parseInt(task.day||1)===dom&&task.lastDone!==t)task.done=false;else if(parseInt(task.day||1)!==dom)task.done=false;}});}
function resetHabitsIfNewDay(){const t=new Date().toDateString();if(D.lastReset!==t){(D.habits||[]).forEach(h=>h.done=false);D.lastReset=t;sv();}}
function genSteps(){
const old=D.s101.steps||[];const steps=[];
let cap=D.s101.cap||100000;const mult=(D.s101.mult||12.5)/100;
for(let i=1;i<=101;i++){
const o=old.find(s=>s.i===i)||{};
const tp=Math.round(cap*mult);const pre=cap+tp;
const tr=o.tr!==undefined?o.tr:(D.s101.gtax||0);
const ta=Math.round(tp*(tr/100));const at=pre-ta;
const wd=o.wd||0;const nb=at-wd;
steps.push({i,sc:Math.round(cap),tp,pre,tr,ta,at,wd,nb,p1:o.p1||0,p2:o.p2||0,p3:o.p3||0,p4:o.p4||0,st:o.st||'Pending',notes:o.notes||''});
cap=nb>0?nb:at;
}
D.s101.steps=steps;
}
function regenFromStep(startSi){
const mult=(D.s101.mult||12.5)/100;
let cap;
if(startSi<=1){genSteps();return;}
const prev=D.s101.steps[startSi-2];
if(!prev)return;
cap=prev.nb>0?prev.nb:prev.at;
for(let i=startSi;i<=101;i++){
const s=D.s101.steps[i-1];if(!s)break;
s.sc=Math.round(cap);s.tp=Math.round(cap*mult);s.pre=s.sc+s.tp;
s.ta=Math.round(s.tp*(s.tr/100));s.at=s.pre-s.ta;
s.nb=s.at-(s.wd||0);
cap=s.nb>0?s.nb:s.at;
}
}
const stp=s=>(s.p1||0)+(s.p2||0)+(s.p3||0)+(s.p4||0);
const spct=s=>s.tp>0?Math.round(stp(s)/s.tp*100):0;
function syncStepProfits(){
D.s101.steps.forEach(s=>{s.p1=0;s.p2=0;s.p3=0;s.p4=0;});
['D1','D2','D3','D4'].forEach((dk,di)=>{(D.logs[dk]||[]).forEach(t=>{if(t.step&&t.pb){const s=D.s101.steps[t.step-1];if(s){const f='p'+(di+1);s[f]=(s[f]||0)+t.pb;}}});});
}
function calcDemat(){const initCap=(D.s101.cap||100000)*4;let booked=0;Object.values(D.logs).forEach(lg=>lg.forEach(t=>booked+=(t.pb||0)));const wds=D.s101.steps.reduce((s,st)=>s+(st.wd||0),0);return initCap+booked-wds;}
function calcIdxFund(){const idx=D.idx||{cap:25000,log:[]};const log=idx.log||[];return(idx.cap||25000)+log.reduce((s,e)=>s+(e.pl||0),0)-log.reduce((s,e)=>s+(e.w||0),0);}
function calcLoansGivenTotal(){return(D.loansGiven||[]).reduce((s,l)=>s+(l.out||0),0);}
function getAccountBalance(acId){const ac=(D.accounts||[]).find(a=>a.id===acId);if(!ac)return 0;let bal=ac.ob||0;(D.tx||[]).forEach(t=>{if(t.type==='transfer'){if(t.fromAc===acId)bal-=t.amt;if(t.toAc===acId)bal+=t.amt;}else if(t.acId===acId){if(t.type==='i')bal+=t.amt;else bal-=t.amt;}});return bal;}
function calcTotalBankCash(){return(D.accounts||[]).reduce((s,a)=>s+getAccountBalance(a.id),0);}
function syncLinks(){
syncStepProfits();
const demat=calcDemat();const idxFund=calcIdxFund();
const bankCash=calcTotalBankCash();const lgTotal=calcLoansGivenTotal();
const totalLoanOut=D.loans.reduce((s,l)=>s+(l.out||0),0);
D._synced={demat,idxFund,bankCash,lgTotal,totalLoanOut};
}
function getTotalAssets(){
const manual=D.assets.reduce((s,a)=>s+(a.v||0),0);
const {demat,idxFund,bankCash,lgTotal}=D._synced||{demat:0,idxFund:0,bankCash:0,lgTotal:0};
return manual+demat+idxFund+bankCash+lgTotal;
}
function getTotalLiabs(){return D.loans.reduce((s,l)=>s+(l.out||0),0);}
function getNetWorth(){return getTotalAssets()-getTotalLiabs();}
function ndd(dd){const n=new Date();n.setHours(0,0,0,0);const t=new Date(n.getFullYear(),n.getMonth(),dd);return t>=n?t:new Date(n.getFullYear(),n.getMonth()+1,dd);}
const du=dd=>{const n=new Date();n.setHours(0,0,0,0);return Math.round((ndd(dd)-n)/86400000)};
function isPaid(c){const n=new Date();const k=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;return(c.pd||[]).includes(k);}
function togPaid(id,fromLoans=false){
let c=D.commits.find(c=>c.id===id);
if(!c&&fromLoans){const l=D.loans.find(l=>l.id===id);if(l){c={id:l.id,pd:l._pd||(l._pd=[])};l._pd=c.pd;}}
if(!c)return;
const n=new Date();const k=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
if(!c.pd)c.pd=[];const i=c.pd.indexOf(k);if(i>=0)c.pd.splice(i,1);else c.pd.push(k);
sv();rDash();rCommit();
}
function getDueSoon(){
const items=[];
D.commits.forEach(c=>{const d=du(c.dd);if(d<=7&&!isPaid(c))items.push({...c,days:d,src:'commit'});});
D.loans.filter(l=>l.out>0&&l.emi>0&&l.dd>0).forEach(l=>{const d=du(l.dd);if(d<=7)items.push({id:l.id,n:l.n+' EMI',amt:l.emi,days:d,src:'loan'});});
D.loansGiven.filter(l=>l.out>0&&l.retDate).forEach(l=>{const d=Math.round((new Date(l.retDate)-new Date())/86400000);if(d>=0&&d<=7)items.push({id:l.id,n:'Receive from '+l.n,amt:l.out,days:d,src:'given'});});
return items.sort((a,b)=>a.days-b.days);
}
function getTodayTasks(){
const n=new Date();const dow=n.getDay();const dom=n.getDate();const t=td();
return(D.tasks||[]).filter(task=>{
if(task.freq==='daily')return true;
if(task.freq==='weekly')return parseInt(task.day||0)===dow;
if(task.freq==='monthly')return parseInt(task.day||1)===dom;
if(task.freq==='once')return task.day===t;
return false;
});
}

// ── DASHBOARD ──
function rDash(){
syncLinks();
const nw=getNetWorth();const ta=getTotalAssets();const tl=getTotalLiabs();
const mk=cm();const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk);
const inc=txs.filter(t=>t.type==='i').reduce((s,t)=>s+t.amt,0);
const exp=txs.filter(t=>t.type==='e').reduce((s,t)=>s+t.amt,0);
const pl=inc-exp;
const fc=D.bfc[mk]||{};const tfc=Object.values(fc).reduce((s,v)=>s+(v||0),0);
const budPct=tfc>0?Math.min(Math.round(exp/tfc*100),999):0;
const savRate=inc>0?Math.round((inc-exp)/inc*100):0;
const cs=D.s101.cur||1;const step=D.s101.steps[cs-1];
const done=D.s101.steps.filter(s=>s.st==='Closed').length;
const openp=Object.values(D.logs).reduce((s,lg)=>s+lg.filter(t=>(t.eq||0)-(t.sq||0)>0).length,0);
const tp=D.s101.steps.reduce((s,st)=>s+stp(st),0);
const due=getDueSoon();const todayT=getTodayTasks();
const debtRatio=ta>0?Math.round(tl/ta*100):0;
const liq=(D.accounts||[]).filter(a=>a.type==='Cash'||a.type==='Savings').reduce((s,a)=>s+getAccountBalance(a.id),0);
const q=D.quotes||DEF.quotes;const qi=Math.floor(new Date().getDate()%(q.length||1));
let stepProg='';

stepProg=`<div class="fbt mb8 txs"><span>Step ${cs} Target: <b class="tgo">${fmt(step.tp)}</b></span><span class="mono tgo">${fmt(ach)} (${sp}%)</span></div><div class="pb"><div class="pf ${cls}" style="width:${Math.min(sp,100)}%"></div></div><div class="fbt mt8 txs"><span style="color:var(--tx3)">Remaining: <span class="mono to">${fmt(Math.max(0,step.tp-ach))}</span></span><span style="color:var(--tx3)">Next corpus: <span class="mono tgo">${fmt(step.nb||step.at)}</span></span></div>`;}
const budWarn=tfc>0&&budPct>=95?`<div class="alert-banner"><span class="to">⚠</span> Budget at ${budPct}% — review expenses immediately</div>`:'';
const dueHTML=due.slice(0,5).map(c=>`<div class="crow"><div><div class="txm">${c.n}</div><div class="txs ${c.days===0?'tr2c':c.days<=2?'to':'ta'}">${c.days===0?'DUE TODAY':c.days===1?'TOMORROW':'In '+c.days+' days — '+ndd(c.dd||1).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</div></div><span class="mono tgo">${fmt(c.amt)}</span></div>`).join('')+(due.length>5?`<div class="view-all-btn" onclick="go('commit',document.querySelectorAll('.ni')[2])">View All ${due.length} items →</div>`:'')+(due.length===0?'<div class="empty txs">No payments due in next 7 days</div>':'');
const taskHTML=todayT.slice(0,5).map(t=>`<div class="crow"><div class="fb"><div onclick="togTask('${t.id}')" style="width:20px;height:20px;border-radius:5px;border:1px solid var(--ac);cursor:pointer;display:flex;align-items:center;justify-content:center;background:${t.done?'var(--ac)':'transparent'};flex-shrink:0;font-size:.8rem">${t.done?'✓':''}</div><span style="${t.done?'text-decoration:line-through;color:var(--tx3)':''}"> ${t.text}</span></div><span class="badge b-ac txs">${t.freq}</span></div>`).join('')+(todayT.length>5?`<div class="view-all-btn" onclick="go('goals',document.querySelectorAll('.ni')[1])">View All →</div>`:'')+(todayT.length===0?'<div class="empty txs">No tasks today — add in Goals tab</div>':'');
ge('sc-dash').innerHTML=`
<div class="qcard mb12"><div class="qtext">"${q[qi]||q[0]}"</div><div class="qauthor">— SS JARVIS Daily</div></div>
${budWarn}
<div class="nw-hero mb12"><div class="nw-label">NET WORTH — LIVE</div><div class="nw-val">${fmt(nw)}</div><div class="g3 mt12"><div><div class="txs" style="color:var(--tx3);margin-bottom:4px">Total Assets</div><div class="mono tg">${fmt(ta)}</div></div><div style="text-align:center"><div class="txs" style="color:var(--tx3);margin-bottom:4px">Liquid Cash</div><div class="mono ta">${fmt(liq)}</div></div><div style="text-align:right"><div class="txs" style="color:var(--tx3);margin-bottom:4px">Total Liabilities</div><div class="mono tr2c">${fmt(tl)}</div></div></div></div>
<div class="g2 mb12">
<div class="card"><div class="ctitle" style="margin-bottom:10px">THIS MONTH</div><div class="fbt mb8 txs"><span>Income</span><span class="mono tg">${fmt(inc)}</span></div><div class="fbt mb8 txs"><span>Expenses</span><span class="mono tr2c">${fmt(exp)}</span></div><div class="pb mb8"><div class="pf ${budPct>=95?'d':budPct>=70?'w':''}" style="width:${Math.min(budPct,100)}%"></div></div><div class="fbt txs"><span>Budget: ${budPct}% used | Savings: ${savRate}%</span><span class="mono ${pl>=0?'tg':'tr2c'}">${fmt(pl)}</span></div></div>
<div class="card"><div class="ctitle" style="margin-bottom:10px">DEBT POSITION</div><div class="fbt mb8 txs"><span>Total Outstanding</span><span class="mono tr2c">${fmt(tl)}</span></div><div class="fbt mb8 txs"><span>Debt / Asset Ratio</span><span class="mono ${debtRatio<=30?'tg':debtRatio<=60?'to':'tr2c'}">${debtRatio}%</span></div><div class="fbt txs"><span>Active Loans</span><span class="mono ta">${D.loans.filter(l=>l.out>0).length}</span></div></div>
</div>
<div class="step-hero mb12"><div class="ctitle" style="margin-bottom:10px">101 STEPS — LIVE</div><div class="g4 mb12"><div class="kpi"><div class="kl">Active Step</div><div class="kv ac">STEP ${cs}</div></div><div class="kpi"><div class="kl">Completed</div><div class="kv gn">${done}</div></div><div class="kpi"><div class="kl">Open Positions</div><div class="kv or">${openp}</div></div><div class="kpi"><div class="kl">Total Profit</div><div class="kv go">${fmt(tp)}</div></div></div>${stepProg}</div>
<div class="card mb12"><div class="ctitle">DUE TODAY <span class="badge b-ac">${todayT.length}</span></div>${taskHTML}</div>
<div class="card"><div class="ctitle">UPCOMING 7 DAYS <span class="badge b-or">${due.length}</span></div>${dueHTML}</div>`;
ge('tnw').textContent='NW: '+fmt(nw);
}

function updTxForm(){const t=ge('ttype')?.value;const cr=ge('tx-cat-row');const tr=ge('tx-transfer-row');const cat=ge('tcat');if(!cr||!tr||!cat)return;if(t==='transfer'){cr.style.display='none';tr.style.display='';}else{cr.style.display='';tr.style.display='none';cat.innerHTML=(t==='i'?D.inc:D.exp).map(c=>`<option>${c}</option>`).join('');}}
function addTx(){const type=ge('ttype').value;const date=ge('tdate').value;if(!date||date<'2026-05-01')return notify('Date must be May 2026+',true);const amt=parseFloat(ge('tamt').value);if(!amt||amt<=0)return notify('Enter amount',true);const note=ge('tnote').value;if(type==='transfer'){const from=ge('tfrom').value;const to=ge('tto').value;if(from===to)return notify('From and To account must be different',true);D.tx.push({id:uid(),type:'transfer',date,fromAc:from,toAc:to,amt,note});}else{const cat=ge('tcat').value;const acId=ge('tac').value;D.tx.push({id:uid(),type,date,cat,acId,amt,note});}syncLinks();sv();ge('tamt').value='';ge('tnote').value='';notify('Recorded');rTxList();rDash();}
function rTxList(){const mk=ge('tfm')?.value||cm();const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk).sort((a,b)=>b.date.localeCompare(a.date));const el=ge('txlist');if(!el)return;if(!txs.length){el.innerHTML='<div class="empty">No transactions this month</div>';return;}let runBal={};txs.slice().reverse().forEach(t=>{if(t.type==='transfer'){if(!runBal[t.fromAc])runBal[t.fromAc]=getAccountBalance(t.fromAc);if(!runBal[t.toAc])runBal[t.toAc]=getAccountBalance(t.toAc);}else{if(!runBal[t.acId])runBal[t.acId]=getAccountBalance(t.acId);}});el.innerHTML=`<div style="overflow-x:auto"><table class="tbl"><tr><th>Date</th><th>Type</th><th>Category / Details</th><th>Account</th><th class="tar">Amount</th><th></th></tr>${txs.map(t=>{const ac=(D.accounts||[]).find(a=>a.id===t.acId||a.id===t.fromAc);return`<tr><td class="mono txs">${t.date.slice(5)}</td><td><span class="badge ${t.type==='i'?'b-gn':t.type==='transfer'?'b-ac':'b-rd'}">${t.type==='i'?'IN':t.type==='transfer'?'XFER':'OUT'}</span></td><td class="txm">${t.type==='transfer'?`${(D.accounts||[]).find(a=>a.id===t.fromAc)?.n||'?'} → ${(D.accounts||[]).find(a=>a.id===t.toAc)?.n||'?'}`:t.cat}${t.note?` <span class="txs">(${t.note})</span>`:''}</td><td class="txs">${ac?.n||'—'}</td><td class="tar mono ${t.type==='i'?'tg':t.type==='transfer'?'ta':'tr2c'}">${t.type==='i'?'+':t.type==='transfer'?'↔':'−'}${fmt(t.amt)}</td><td class="fb"><button class="btn bxs bd2" onclick="delTx('${t.id}')">×</button></td></tr>`;}).join('')}</table></div>`;}
function delTx(id){if(!confirm('Delete?'))return;D.tx=D.tx.filter(t=>t.id!==id);syncLinks();sv();rTxList();rDash();}
// ── BUDGET ──
function rBudget(){
ge('sc-budget').innerHTML=`<div class="tabs" id="btabs"><button class="tab a" onclick="bTab('monthly',this)">Monthly</button><button class="tab" onclick="bTab('weekly',this)">Weekly</button><button class="tab" onclick="bTab('annual',this)">Annual</button></div>
<div id="bt-monthly"><div class="card"><div class="ctitle">MONTHLY FORECAST <button class="btn bg2 bsm" onclick="addExpCatInline()">+ Category</button></div><div class="shdr" style="margin-bottom:10px"><select id="bmon" onchange="rBFc()" style="width:auto;padding:6px 10px;font-size:.8rem">${moOpts()}</select><button class="btn bp bsm" onclick="saveBFC()">Save</button></div><div id="bfc-table"></div></div></div>
<div id="bt-weekly" style="display:none"><div class="card"><div class="ctitle">WEEKLY CASH FLOW</div><select id="wkmon" onchange="rWK()" style="width:auto;padding:6px 10px;font-size:.8rem;margin-bottom:14px">${moOpts()}</select><div id="wktbl"></div></div></div>
<div id="bt-annual" style="display:none"><div class="card"><div class="ctitle">ANNUAL P&L</div><select id="anyr" onchange="rAnnual()" style="width:auto;padding:6px 10px;font-size:.8rem;margin-bottom:14px">${[...Array(25)].map((_,i)=>`<option ${i+2026===new Date().getFullYear()?'selected':''}>${i+2026}</option>`).join('')}</select><div id="antbl"></div></div></div>`;
rBFc();
}
function bTab(t,el){document.querySelectorAll('#btabs .tab').forEach(x=>x.classList.remove('a'));el.classList.add('a');['monthly','weekly','annual'].forEach(x=>{const d=ge('bt-'+x);if(d)d.style.display=x===t?'':'none';});if(t==='weekly')rWK();if(t==='annual')rAnnual();}
function rBFc(){const mk=ge('bmon')?.value||cm();const fc=D.bfc[mk]||{};const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk&&t.type==='e');const el=ge('bfc-table');if(!el)return;let tot=0;let actTot=0;el.innerHTML=D.exp.map(cat=>{const f=fc[cat]||0;const a=txs.filter(t=>t.cat===cat).reduce((s,t)=>s+t.amt,0);const p=f>0?Math.min(Math.round(a/f*100),999):0;const cls=p>=95?'d':p>=70?'w':'';tot+=f;actTot+=a;if(p>=95)setTimeout(()=>notify(`⚠ ${cat} at ${p}% budget!`),100);return`<div class="mb8"><div class="fbt txs mb4"><span>${cat}</span><div class="fb"><span class="mono ${p>=95?'tr2c':p>=70?'to':'tg'}">${fmt(a)}/${fmt(f)}</span><span class="txs" style="margin-left:8px">${f>0?p+'%':''}</span></div></div><div class="fr c2" style="gap:6px;margin:0"><input type="number" value="${f||''}" placeholder="Budget" style="text-align:right;padding:5px 8px;font-size:.8rem" onchange="updFC('${mk}','${cat}',this.value)"><div class="pb" style="margin:0;align-self:center"><div class="pf ${cls}" style="width:${Math.min(p,100)}%"></div></div></div></div>`;}).join('')+`<div class="bs-tot mt8"><span class="ta">Total Budget</span><span class="mono tgo">${fmt(tot)}</span></div><div class="bs-tot"><span class="ta">Total Actual</span><span class="mono ${actTot>tot?'tr2c':'tg'}">${fmt(actTot)}</span></div>`;}
function updFC(m,cat,v){if(!D.bfc[m])D.bfc[m]={};D.bfc[m][cat]=parseFloat(v)||0;}
function saveBFC(){sv();notify('Budget saved');rDash();}
function addExpCatInline(){omo('ADD EXPENSE CATEGORY','<div class="fr"><div><label>Category Name</label><input id="nc"></div></div>',()=>{const n=ge('nc').value.trim();if(!n)return;if(!D.exp.includes(n)){D.exp.push(n);sv();rBFc();updTxForm();}cmo();notify('Added');});}
function rWK(){const mk=ge('wkmon')?.value||cm();const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk);const d=[{i:0,o:0},{i:0,o:0},{i:0,o:0},{i:0,o:0}];txs.forEach(t=>{const dy=parseInt(t.date.slice(8));const w=dy<=7?0:dy<=14?1:dy<=21?2:3;if(t.type==='i')d[w].i+=t.amt;else if(t.type==='e')d[w].o+=t.amt;});const el=ge('wktbl');if(!el)return;el.innerHTML=`<table class="tbl"><tr><th>Week</th><th class="tar">Inflow</th><th class="tar">Outflow</th><th class="tar">Net</th></tr>${d.map((x,i)=>`<tr><td>${['W1 (1-7)','W2 (8-14)','W3 (15-21)','W4 (22-31)'][i]}</td><td class="tar mono tg">${fmt(x.i)}</td><td class="tar mono tr2c">${fmt(x.o)}</td><td class="tar mono ${x.i-x.o>=0?'tg':'tr2c'}">${fmt(x.i-x.o)}</td></tr>`).join('')}<tr style="font-weight:700"><td>Total</td><td class="tar mono tg">${fmt(d.reduce((s,x)=>s+x.i,0))}</td><td class="tar mono tr2c">${fmt(d.reduce((s,x)=>s+x.o,0))}</td><td class="tar mono">${fmt(d.reduce((s,x)=>s+(x.i-x.o),0))}</td></tr></table>`;}
function rAnnual(){const yr=ge('anyr')?.value||new Date().getFullYear();const el=ge('antbl');if(!el)return;const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];let rows='';let totI=0;let totE=0;months.forEach((m,i)=>{const mk=`${yr}-${String(i+1).padStart(2,'0')}`;if(mk<'2026-05')return;const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk);const inc=txs.filter(t=>t.type==='i').reduce((s,t)=>s+t.amt,0);const exp=txs.filter(t=>t.type==='e').reduce((s,t)=>s+t.amt,0);totI+=inc;totE+=exp;rows+=`<tr><td>${m}</td><td class="tar mono tg">${fmt(inc)}</td><td class="tar mono tr2c">${fmt(exp)}</td><td class="tar mono ${inc-exp>=0?'tg':'tr2c'}">${fmt(inc-exp)}</td></tr>`;});el.innerHTML=`<table class="tbl"><tr><th>Month</th><th class="tar">Income</th><th class="tar">Expense</th><th class="tar">Net</th></tr>${rows}<tr style="font-weight:700"><td>TOTAL ${yr}</td><td class="tar mono tg">${fmt(totI)}</td><td class="tar mono tr2c">${fmt(totE)}</td><td class="tar mono ${totI-totE>=0?'tg':'tr2c'}">${fmt(totI-totE)}</td></tr></table>`;}
// ── LOANS ──
function rLoans(){
const tot=D.loans.reduce((s,l)=>s+(l.out||0),0);const emi=D.loans.reduce((s,l)=>s+(l.emi||0),0);const lgTot=(D.loansGiven||[]).reduce((s,l)=>s+(l.out||0),0);
ge('sc-loans').innerHTML=`<div class="tabs" id="ltabs"><button class="tab a" onclick="lTab('taken',this)">Loans Taken</button><button class="tab" onclick="lTab('given',this)">Loans Given</button></div>
<div id="lt-taken"><div class="g2 mb12"><div class="kpi"><div class="kl">Total Outstanding</div><div class="kv rd">${fmt(tot)}</div></div><div class="kpi"><div class="kl">Monthly EMI Burden</div><div class="kv or">${fmt(emi)}</div></div></div><div class="shdr"><h2>LOANS TAKEN</h2><button class="btn bg2 bsm" onclick="addLoan()">+ Loan</button></div>${D.loans.map(l=>`<div class="loan-card"><div class="fbt mb10"><div><div style="font-family:Orbitron,sans-serif;font-size:.68rem;letter-spacing:2px;color:var(--tx2)">${l.n}</div><div class="fb mt4"><span class="badge ${l.type==='formal'?'b-ac':'b-or'}">${l.type}</span>${l.dd>0?`<span class="txs">Due: ${l.dd}th — <b class="${du(l.dd)<=3?'tr2c':du(l.dd)<=7?'to':'tg'}">${du(l.dd)}d</b></span>`:''}</div></div><div class="fb"><button class="btn bxs bg2" onclick="editLoan('${l.id}')">Edit</button><button class="btn bxs bd2" onclick="delLoan('${l.id}')">×</button></div></div><div class="g3"><div><label>Outstanding ₹</label><input type="number" value="${l.out||''}" placeholder="0" style="padding:6px 8px" onchange="updLoan('${l.id}','out',this.value)"></div><div><label>EMI ₹</label><input type="number" value="${l.emi||''}" placeholder="0" style="padding:6px 8px" onchange="updLoan('${l.id}','emi',this.value)"></div><div><label>Due Day</label><input type="number" value="${l.dd||''}" placeholder="5" style="padding:6px 8px" onchange="updLoan('${l.id}','dd',this.value)"></div></div><input type="text" value="${l.notes||''}" placeholder="Notes..." style="margin-top:8px;padding:6px 8px;font-size:.8rem" onchange="updLoan('${l.id}','notes',this.value)"></div>`).join('')+(!D.loans.length?'<div class="empty">No loans taken</div>':'')}</div>
<div id="lt-given" style="display:none"><div class="kpi mb12"><div class="kl">Total Receivable</div><div class="kv gn">${fmt(lgTot)}</div></div><div class="shdr"><h2>LOANS GIVEN</h2><button class="btn bg2 bsm" onclick="addLoanGiven()">+ Add</button></div>${(D.loansGiven||[]).map(l=>`<div class="loan-card"><div class="fbt mb10"><div><div style="font-family:Orbitron,sans-serif;font-size:.68rem;letter-spacing:2px;color:var(--gn)">${l.n}</div>${l.retDate?`<div class="txs">Expected return: <b class="${du_date(l.retDate)<=7?'to':'tg'}">${l.retDate}</b> (${du_date(l.retDate)} days)</div>`:''}</div><div class="fb"><button class="btn bxs bg2" onclick="editLoanGiven('${l.id}')">Edit</button><button class="btn bxs bg2" onclick="recvLoan('${l.id}')">Received</button><button class="btn bxs bd2" onclick="delLoanGiven('${l.id}')">×</button></div></div><div class="g2"><div><label>Outstanding ₹</label><div class="mono tg" style="padding:8px 0;font-size:1.1rem">${fmt(l.out)}</div></div><div><label>Notes</label><div class="txs">${l.notes||'—'}</div></div></div></div>`).join('')+(!D.loansGiven?.length?'<div class="empty">No loans given — all friends and family settled</div>':'')}</div>`;
}
function lTab(t,el){document.querySelectorAll('#ltabs .tab').forEach(x=>x.classList.remove('a'));el.classList.add('a');['taken','given'].forEach(x=>{const d=ge('lt-'+x);if(d)d.style.display=x===t?'':'none';});}
function du_date(dateStr){if(!dateStr)return 999;const d=new Date(dateStr);const n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);}
function updLoan(id,f,v){const l=D.loans.find(l=>l.id===id);if(!l)return;l[f]=f==='notes'?v:(parseFloat(v)||0);syncLinks();sv();}
function addLoan(){omo('ADD LOAN TAKEN',`<div class="fr c2"><div><label>Lender Name</label><input id="lln"></div><div><label>Type</label><select id="llt"><option value="formal">Formal</option><option value="informal">Informal</option></select></div></div><div class="fr c3"><div><label>Outstanding ₹</label><input type="number" id="llo"></div><div><label>EMI ₹</label><input type="number" id="lle"></div><div><label>Due Day</label><input type="number" id="lldd"></div></div><div class="fr c2"><div><label>Interest Rate %</label><input type="number" id="llr" step="0.1"></div><div><label>Notes</label><input id="lln2"></div></div>`,()=>{const n=ge('lln').value.trim();if(!n)return;D.loans.push({id:uid(),n,type:ge('llt').value,out:parseFloat(ge('llo').value)||0,emi:parseFloat(ge('lle').value)||0,dd:parseInt(ge('lldd').value)||0,rate:parseFloat(ge('llr').value)||0,notes:ge('lln2').value});syncLinks();sv();rLoans();cmo();notify('Loan added');});}
function editLoan(id){const l=D.loans.find(l=>l.id===id);if(!l)return;omo('EDIT LOAN',`<div class="fr c2"><div><label>Name</label><input id="lln" value="${l.n}"></div><div><label>Type</label><select id="llt"><option value="formal" ${l.type==='formal'?'selected':''}>Formal</option><option value="informal" ${l.type==='informal'?'selected':''}>Informal</option></select></div></div><div class="fr c3"><div><label>Outstanding</label><input type="number" id="llo" value="${l.out}"></div><div><label>EMI</label><input type="number" id="lle" value="${l.emi}"></div><div><label>Due Day</label><input type="number" id="lldd" value="${l.dd}"></div></div><div class="fr c2"><div><label>Interest %</label><input type="number" id="llr" value="${l.rate||0}" step="0.1"></div><div><label>Notes</label><input id="lln2" value="${l.notes||''}"></div></div>`,()=>{l.n=ge('lln').value.trim();l.type=ge('llt').value;l.out=parseFloat(ge('llo').value)||0;l.emi=parseFloat(ge('lle').value)||0;l.dd=parseInt(ge('lldd').value)||0;l.rate=parseFloat(ge('llr').value)||0;l.notes=ge('lln2').value;syncLinks();sv();rLoans();cmo();notify('Updated');});}
function delLoan(id){if(!confirm('Delete?'))return;D.loans=D.loans.filter(l=>l.id!==id);syncLinks();sv();rLoans();}
function addLoanGiven(){omo('ADD LOAN GIVEN',`<div class="fr c2"><div><label>Borrower Name</label><input id="lbn"></div><div><label>Amount Given ₹</label><input type="number" id="lbo"></div></div><div class="fr c2"><div><label>Date Given</label><input type="date" id="lbd" value="${td()}"></div><div><label>Expected Return Date</label><input type="date" id="lbr"></div></div><div class="fr"><div><label>Notes</label><input id="lbnotes" placeholder="Friends and family — no interest"></div></div>`,()=>{const n=ge('lbn').value.trim();if(!n)return;if(!D.loansGiven)D.loansGiven=[];D.loansGiven.push({id:uid(),n,out:parseFloat(ge('lbo').value)||0,dt:ge('lbd').value,retDate:ge('lbr').value,notes:ge('lbnotes').value});syncLinks();sv();rLoans();cmo();notify('Added');});}
function editLoanGiven(id){const l=(D.loansGiven||[]).find(l=>l.id===id);if(!l)return;omo('EDIT LOAN GIVEN',`<div class="fr c2"><div><label>Name</label><input id="lbn" value="${l.n}"></div><div><label>Outstanding ₹</label><input type="number" id="lbo" value="${l.out}"></div></div><div class="fr c2"><div><label>Date Given</label><input type="date" id="lbd" value="${l.dt||''}"></div><div><label>Expected Return</label><input type="date" id="lbr" value="${l.retDate||''}"></div></div><div class="fr"><div><label>Notes</label><input id="lbnotes" value="${l.notes||''}"></div></div>`,()=>{l.n=ge('lbn').value.trim();l.out=parseFloat(ge('lbo').value)||0;l.dt=ge('lbd').value;l.retDate=ge('lbr').value;l.notes=ge('lbnotes').value;syncLinks();sv();rLoans();cmo();notify('Updated');});}
function recvLoan(id){const l=(D.loansGiven||[]).find(l=>l.id===id);if(!l)return;omo(`MARK RECEIVED — ${l.n}`,`<div class="card mb12"><div class="fbt"><span>Outstanding</span><span class="mono tg">${fmt(l.out)}</span></div></div><div class="fr"><div><label>Amount Received ₹</label><input type="number" id="recv" value="${l.out}"></div></div><div class="txs mt8" style="color:var(--tx3)">This reduces the Receivable in Balance Sheet. Not treated as income.</div>`,()=>{const amt=parseFloat(ge('recv').value)||0;l.out=Math.max(0,l.out-amt);if(l.out===0)D.loansGiven=D.loansGiven.filter(x=>x.id!==id);syncLinks();sv();rLoans();cmo();notify('Receivable reduced — B/S updated');});}
function delLoanGiven(id){if(!confirm('Delete?'))return;D.loansGiven=(D.loansGiven||[]).filter(l=>l.id!==id);syncLinks();sv();rLoans();}
// ── P&L ──
function rPL(){
const now=new Date();let yo='';for(let y=2026;y<=2050;y++)yo+=`<option ${y===now.getFullYear()?'selected':''}>${y}</option>`;
const mnames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let mo2='';mnames.forEach((m,i)=>mo2+=`<option value="${String(i+1).padStart(2,'0')}"${i===now.getMonth()?' selected':''}>${m}</option>`);
ge('sc-pl').innerHTML=`<div class="tabs" id="pltabs"><button class="tab a" onclick="plTab('monthly',this)">Monthly</button><button class="tab" onclick="plTab('annual',this)">Annual</button></div>
<div id="plt-monthly">
<div class="shdr"><h2>P&L STATEMENT</h2><div class="fb"><select id="plyr" onchange="calcPL()" style="width:auto;padding:6px 10px">${yo}</select><select id="plmo" onchange="calcPL()" style="width:auto;padding:6px 10px">${mo2}</select></div></div>
<div class="g2 mb12"><div class="kpi"><div class="kl">Total Income</div><div class="kv gn" id="plinc">₹0</div></div><div class="kpi"><div class="kl">Total Expense</div><div class="kv rd" id="plexp">₹0</div></div></div>
<div class="kpi mb12" style="padding:20px;text-align:center"><div class="kl">NET SURPLUS / DEFICIT</div><div class="kv mono" id="plnet" style="font-size:1.8rem">₹0</div><div class="txs mt8" id="plsav"></div></div>
<div class="card mb12"><div class="ctitle">INCOME BREAKDOWN</div><div id="plib"></div></div>
<div class="card mb12"><div class="ctitle">EXPENSE BREAKDOWN</div><div id="pleb"></div></div>
<div class="card"><div class="ctitle">LAST 6 MONTHS TREND</div><div id="plmom"></div></div>
</div>
<div id="plt-annual" style="display:none">
<div class="shdr"><h2>ANNUAL P&L</h2><select id="planyr" onchange="calcAnnualPL()" style="width:auto;padding:6px 10px">${yo}</select></div>
<div id="pl-annual-content"></div>
</div>`;
calcPL();
}
function plTab(t,el){document.querySelectorAll('#pltabs .tab').forEach(x=>x.classList.remove('a'));el.classList.add('a');['monthly','annual'].forEach(x=>{const d=ge('plt-'+x);if(d)d.style.display=x===t?'':'none';});if(t==='annual')calcAnnualPL();}
function calcPL(){const yr=ge('plyr')?.value;const mo=ge('plmo')?.value;if(!yr||!mo)return;const mk=`${yr}-${mo}`;if(mk<'2026-05'){ge('plnet').textContent='Select May 2026 or later';return;}const txs=D.tx.filter(t=>t.date?.slice(0,7)===mk);const inc=txs.filter(t=>t.type==='i').reduce((s,t)=>s+t.amt,0);const exp=txs.filter(t=>t.type==='e').reduce((s,t)=>s+t.amt,0);const net=inc-exp;ge('plinc').textContent=fmt(inc);ge('plexp').textContent=fmt(exp);const nel=ge('plnet');nel.textContent=fmt(net);nel.className='kv mono '+(net>=0?'gn':'rd');nel.style.fontSize='1.8rem';const sav=inc>0?Math.round((inc-exp)/inc*100):0;ge('plsav').textContent=`Savings Rate: ${sav}% | Budget Used: ${Object.values(D.bfc[mk]||{}).reduce((s,v)=>s+v,0)>0?Math.round(exp/Object.values(D.bfc[mk]||{}).reduce((s,v)=>s+v,0)*100):0}%`;const ic={};txs.filter(t=>t.type==='i').forEach(t=>ic[t.cat]=(ic[t.cat]||0)+t.amt);ge('plib').innerHTML=Object.entries(ic).length?Object.entries(ic).map(([c,a])=>`<div class="fbt mb8 txm"><span>${c}</span><span class="mono tg">${fmt(a)}</span></div>`).join(''):'<div class="empty">No income recorded</div>';const ec={};txs.filter(t=>t.type==='e').forEach(t=>ec[t.cat]=(ec[t.cat]||0)+t.amt);ge('pleb').innerHTML=Object.entries(ec).length?Object.entries(ec).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<div class="fbt mb8 txm"><span>${c}</span><span class="mono tr2c">${fmt(a)}</span></div>`).join(''):'<div class="empty">No expenses recorded</div>';const months=[];for(let i=5;i>=0;i--){const d=new Date(parseInt(yr),parseInt(mo)-1-i,1);if(d>=new Date(2026,4,1))months.push(d.toISOString().slice(0,7));}ge('plmom').innerHTML=`<table class="tbl"><tr><th>Month</th><th class="tar">Income</th><th class="tar">Expense</th><th class="tar">Net</th></tr>${months.map(m=>{const mt=D.tx.filter(t=>t.date?.slice(0,7)===m);const mi=mt.filter(t=>t.type==='i').reduce((s,t)=>s+t.amt,0);const me=mt.filter(t=>t.type==='e').reduce((s,t)=>s+t.amt,0);const mn=mi-me;const dl=new Date(m+'-01');return`<tr><td class="txs">${dl.toLocaleDateString('en-IN',{month:'short',year:'2-digit'})}</td><td class="tar mono tg">${fmt(mi)}</td><td class="tar mono tr2c">${fmt(me)}</td><td class="tar mono ${mn>=0?'tg':'tr2c'}">${fmt(mn)}</td></tr>`;}).join('')}</table>`;}
function calcAnnualPL(){const yr=ge('planyr')?.value||new Date().getFullYear();const el=ge('pl-annual-content');if(!el)return;const txs=D.tx.filter(t=>t.date?.startsWith(yr));const inc=txs.filter(t=>t.type==='i').reduce((s,t)=>s+t.amt,0);const exp=txs.filter(t=>t.type==='e').reduce((s,t)=>s+t.amt,0);const net=inc-exp;const sav=inc>0?Math.round(net/inc*100):0;el.innerHTML=`<div class="g3 mb12"><div class="kpi"><div class="kl">Annual Income</div><div class="kv gn">${fmt(inc)}</div></div><div class="kpi"><div class="kl">Annual Expense</div><div class="kv rd">${fmt(exp)}</div></div><div class="kpi"><div class="kl">Annual Surplus</div><div class="kv ${net>=0?'gn':'rd'}">${fmt(net)}</div></div></div><div class="kpi mb12"><div class="kl">SAVINGS RATE ${yr}</div><div class="kv mono ${sav>=20?'gn':sav>=0?'or':'rd'}" style="font-size:1.8rem">${sav}%</div></div>`+rBudget_Annual_Detail(yr);}
function rBudget_Annual_Detail(yr){const txs=D.tx.filter(t=>t.date?.startsWith(yr)&&t.type==='e');const ec={};txs.forEach(t=>ec[t.cat]=(ec[t.cat]||0)+t.amt);return`<div class="card"><div class="ctitle">EXPENSE BREAKDOWN ${yr}</div>${Object.entries(ec).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<div class="fbt mb8 txm"><span>${c}</span><span class="mono tr2c">${fmt(a)}</span></div>`).join('')||'<div class="empty">No expenses</div>'}</div>`;}
// ── BALANCE SHEET ──
function rBS(){
syncLinks();
const {demat,idxFund,bankCash,lgTotal}=D._synced||{demat:0,idxFund:0,bankCash:0,lgTotal:0};
const manualAssets=D.assets.reduce((s,a)=>s+(a.v||0),0);
const ta=manualAssets+demat+idxFund+bankCash+lgTotal;
const tl=D.loans.reduce((s,l)=>s+(l.out||0),0);const nw=ta-tl;
ge('sc-bs').innerHTML=`<div class="nw-hero mb12"><div class="nw-label">NET WORTH — REAL TIME</div><div class="nw-val">${fmt(nw)}</div><div class="fbt mt8 txs"><span>Total Assets: <span class="mono tg">${fmt(ta)}</span></span><span>Total Liabilities: <span class="mono tr2c">${fmt(tl)}</span></span></div></div>
<div class="card mb12"><div class="ctitle" style="color:var(--gn)">ASSETS <button class="btn bg2 bsm" onclick="addAsset()">+ Manual Asset</button></div>
<div class="bs-row"><div style="flex:1"><div class="txm">Demat Portfolio (Auto)</div><div class="txs"><span class="badge b-ac">AUTO — 101 Steps</span></div></div><span class="mono tgo">${fmt(demat)}</span></div>
<div class="bs-row"><div style="flex:1"><div class="txm">Index Trading Fund (Auto)</div><div class="txs"><span class="badge b-pu">AUTO — Index Trading</span></div></div><span class="mono pu">${fmt(idxFund)}</span></div>
<div class="bs-row"><div style="flex:1"><div class="txm">Bank & Cash Accounts (Auto)</div><div class="txs"><span class="badge b-ac">AUTO — Account Master</span></div></div><span class="mono ta">${fmt(bankCash)}</span></div>
${lgTotal>0?`<div class="bs-row"><div style="flex:1"><div class="txm">Loans Given / Receivable (Auto)</div><div class="txs"><span class="badge b-gn">AUTO — Loans Given</span></div></div><span class="mono tg">${fmt(lgTotal)}</span></div>`:''}
${D.assets.map(a=>`<div class="bs-row"><div style="flex:1"><div class="txm">${a.n}</div><div class="txs">${a.cat}</div></div><input type="number" value="${a.v||''}" placeholder="0" style="width:120px;text-align:right;padding:6px 8px;font-size:.82rem" onchange="D.assets.find(x=>x.id==='${a.id}').v=parseFloat(this.value)||0;syncLinks();sv();updateBSTotals()"><div class="fb" style="margin-left:6px"><button class="btn bxs bg2" onclick="editAsset('${a.id}')">Edit</button><button class="btn bxs bd2" onclick="delAsset('${a.id}')">×</button></div></div>`).join('')}
<div class="bs-tot"><span class="ta">Total Assets</span><span class="tg mono" id="bs-ta">${fmt(ta)}</span></div>
</div>
<div class="card"><div class="ctitle" style="color:var(--rd)">LIABILITIES (Auto — from Loans Taken)</div>
${D.loans.filter(l=>l.out>0).map(l=>`<div class="bs-row"><div style="flex:1"><div class="txm">${l.n}</div><div class="txs"><span class="badge ${l.type==='formal'?'b-ac':'b-or'}">${l.type}</span></div></div><span class="mono tr2c">${fmt(l.out)}</span></div>`).join('')||'<div class="empty txs">No outstanding loans</div>'}
<div class="bs-tot"><span class="tr2c">Total Liabilities</span><span class="tr2c mono">${fmt(tl)}</span></div>
</div>`;ge('tnw').textContent='NW: '+fmt(nw);}
function updateBSTotals(){syncLinks();const {demat,idxFund,bankCash,lgTotal}=D._synced||{};const ta=(D.assets.reduce((s,a)=>s+(a.v||0),0))+demat+idxFund+bankCash+lgTotal;const tl=D.loans.reduce((s,l)=>s+(l.out||0),0);const el=ge('bs-ta');if(el)el.textContent=fmt(ta);ge('tnw').textContent='NW: '+fmt(ta-tl);}
function addAsset(){omo('ADD MANUAL ASSET',`<div class="fr c2"><div><label>Name</label><input id="an"></div><div><label>Category</label><select id="ac">${['Property','Gold','Jewellery','PF','e-NPS','FD','Other'].map(c=>`<option>${c}</option>`).join('')}</select></div></div><div class="fr"><div><label>Current Value ₹</label><input type="number" id="av"></div></div>`,()=>{const n=ge('an').value.trim();if(!n)return;D.assets.push({id:uid(),n,cat:ge('ac').value,v:parseFloat(ge('av').value)||0});sv();rBS();cmo();notify('Added');});}
function editAsset(id){const a=D.assets.find(a=>a.id===id);if(!a)return;omo('EDIT ASSET',`<div class="fr c2"><div><label>Name</label><input id="an" value="${a.n}"></div><div><label>Category</label><select id="ac">${['Property','Gold','Jewellery','PF','e-NPS','FD','Other'].map(c=>`<option ${c===a.cat?'selected':''}>${c}</option>`).join('')}</select></div></div><div class="fr"><div><label>Value ₹</label><input type="number" id="av" value="${a.v}"></div></div>`,()=>{a.n=ge('an').value.trim();a.cat=ge('ac').value;a.v=parseFloat(ge('av').value)||0;sv();rBS();cmo();notify('Updated');});}
function delAsset(id){if(!confirm('Delete?'))return;D.assets=D.assets.filter(a=>a.id!==id);sv();rBS();}
// ── SETTINGS ──
function rSet(){
ge('sc-set').innerHTML=`<div class="tabs" id="settabs"><button class="tab a" onclick="setTab('profile',this)">Profile</button><button class="tab" onclick="setTab('accounts',this)">Accounts</button><button class="tab" onclick="setTab('security',this)">Security</button><button class="tab" onclick="setTab('s101',this)">101 Steps</button><button class="tab" onclick="setTab('incsrc',this)">Income</button><button class="tab" onclick="setTab('expcats',this)">Expenses</button><button class="tab" onclick="setTab('quotes',this)">Quotes</button><button class="tab" onclick="setTab('data',this)">Data</button></div>
<div id="set-profile"><div class="card"><div class="ctitle">YOUR PROFILE</div><div class="fr c2"><div><label>Full Name</label><input id="pname" value="${D.profile?.name||''}"></div><div><label>Date of Birth</label><input type="date" id="pdob" value="${D.profile?.dob||''}"></div></div><button class="btn bp" onclick="saveProfile()">Save Profile</button></div></div>
<div id="set-accounts" style="display:none"><div class="card"><div class="ctitle">ACCOUNT MASTER <button class="btn bg2 bsm" onclick="addAccount()">+ Account</button></div>${(D.accounts||[]).map(a=>`<div class="bs-row"><div style="flex:1"><div class="txm">${a.n}</div><div class="txs">${a.type} — Opening Balance: ${fmt(a.ob||0)}</div></div><div class="fb"><button class="btn bxs bg2" onclick="editAccount('${a.id}')">Edit</button><button class="btn bxs bd2" onclick="delAccount('${a.id}')">×</button></div></div>`).join('')||'<div class="empty">No accounts</div>'}</div></div>
<div id="set-security" style="display:none"><div class="card"><div class="ctitle">CHANGE PASSWORD</div><div class="fr"><div><label>New Password</label><input type="password" id="npwd" placeholder="Min 4 characters"></div></div><button class="btn bp" onclick="chgPwd()">Change Password</button></div></div>
<div id="set-s101" style="display:none"><div class="card"><div class="ctitle">101 STEPS CONFIGURATION</div><div class="fr c2"><div><label>Start Capital per Demat ₹</label><input type="number" id="s101cap" value="${D.s101.cap||100000}"></div><div><label>Multiplier % (12.5 = 12.5%)</label><input type="number" id="s101mult" step="0.1" value="${D.s101.mult||12.5}"></div></div><div class="fr c2"><div><label>Global Tax Rate % (per step overridable)</label><input type="number" id="s101tax" step="0.1" value="${D.s101.gtax||0}"></div><div><label>Current Active Step</label><input type="number" id="s101cur" min="1" max="101" value="${D.s101.cur||1}"></div></div><div class="fr c2"><div><label>Index Trading Capital ₹</label><input type="number" id="s101idx" value="${D.idx?.cap||25000}"></div></div><button class="btn bgd wf" onclick="saveS101Settings()">Save & Regenerate 101 Steps</button></div></div>
<div id="set-incsrc" style="display:none"><div class="card"><div class="ctitle">INCOME SOURCES <button class="btn bg2 bsm" onclick="addIncSrc()">+ Add</button></div>${D.inc.map((s,i)=>`<div class="fbt mb8 txm"><span>${s}</span><div class="fb"><button class="btn bxs bg2" onclick="editIncSrc(${i})">Edit</button><button class="btn bxs bd2" onclick="delIncSrc(${i})">×</button></div></div>`).join('')}</div></div>
<div id="set-expcats" style="display:none"><div class="card"><div class="ctitle">EXPENSE CATEGORIES <button class="btn bg2 bsm" onclick="addExpCat()">+ Add</button></div>${D.exp.map((c,i)=>`<div class="fbt mb8 txm"><span>${c}</span><div class="fb"><button class="btn bxs bg2" onclick="editExpCat(${i})">Edit</button><button class="btn bxs bd2" onclick="delExpCat(${i})">×</button></div></div>`).join('')}</div></div>
<div id="set-quotes" style="display:none"><div class="card"><div class="ctitle">DAILY QUOTES <button class="btn bg2 bsm" onclick="addQuote()">+ Add</button></div><div class="txs mb12" style="color:var(--tx3)">These rotate on the Dashboard. Write from your soul — spiritual, grounding, yours.</div>${(D.quotes||[]).map((q,i)=>`<div class="fbt mb8" style="gap:10px"><span class="txm" style="flex:1;font-style:italic">"${q}"</span><div class="fb"><button class="btn bxs bg2" onclick="editQuote(${i})">Edit</button><button class="btn bxs bd2" onclick="delQuote(${i})">×</button></div></div>`).join('')}</div></div>
<div id="set-data" style="display:none"><div class="card mb12"><div class="ctitle">DATA MANAGEMENT</div><div class="fb mb12"><button class="btn bs2" onclick="expData()">📥 Export JSON Backup</button><button class="btn bg2" onclick="ge('impf').click()">📤 Import JSON</button><input type="file" id="impf" accept=".json" style="display:none" onchange="impData(event)"></div></div><div class="card" style="border-color:var(--rd)"><div class="ctitle" style="color:var(--rd)">DANGER ZONE — RESET ALL DATA</div><div class="txs mb12" style="color:var(--tx3)">This will permanently delete ALL your data. Cannot be undone.</div><button class="btn bd2" onclick="resetConfirm()">🗑 Reset All Data</button></div></div>`;
}
function setTab(t,el){document.querySelectorAll('#settabs .tab').forEach(x=>x.classList.remove('a'));el.classList.add('a');['profile','accounts','security','s101','incsrc','expcats','quotes','data'].forEach(x=>{const d=ge('set-'+x);if(d)d.style.display=x===t?'':'none';});}
function saveProfile(){if(!D.profile)D.profile={};D.profile.name=ge('pname').value.trim();D.profile.dob=ge('pdob').value;sv();notify('Profile saved');}
function addAccount(){omo('ADD ACCOUNT',`<div class="fr c2"><div><label>Account Name</label><input id="acn" placeholder="HDFC Savings"></div><div><label>Type</label><select id="actype"><option>Savings</option><option>Current</option><option>Cash</option><option>FD</option><option>Wallet</option></select></div></div><div class="fr"><div><label>Opening Balance ₹ (as on May 2026)</label><input type="number" id="acob"></div></div>`,()=>{const n=ge('acn').value.trim();if(!n)return;if(!D.accounts)D.accounts=[];D.accounts.push({id:uid(),n,type:ge('actype').value,ob:parseFloat(ge('acob').value)||0});sv();rSet();cmo();notify('Account added');});}
function editAccount(id){const a=(D.accounts||[]).find(a=>a.id===id);if(!a)return;omo('EDIT ACCOUNT',`<div class="fr c2"><div><label>Name</label><input id="acn" value="${a.n}"></div><div><label>Type</label><select id="actype">${['Savings','Current','Cash','FD','Wallet'].map(t=>`<option ${t===a.type?'selected':''}>${t}</option>`).join('')}</select></div></div><div class="fr"><div><label>Opening Balance ₹</label><input type="number" id="acob" value="${a.ob||0}"></div></div>`,()=>{a.n=ge('acn').value.trim();a.type=ge('actype').value;a.ob=parseFloat(ge('acob').value)||0;sv();syncLinks();rSet();cmo();notify('Updated');});}
function delAccount(id){if(!confirm('Delete account?'))return;D.accounts=(D.accounts||[]).filter(a=>a.id!==id);syncLinks();sv();rSet();}
function chgPwd(){const p=ge('npwd').value;if(!p||p.length<4)return notify('Min 4 characters',true);D.pwd=p;sv();notify('Password changed');}
function saveS101Settings(){D.s101.cap=parseFloat(ge('s101cap').value)||100000;D.s101.mult=parseFloat(ge('s101mult').value)||12.5;D.s101.gtax=parseFloat(ge('s101tax').value)||0;D.s101.cur=parseInt(ge('s101cur').value)||1;if(!D.idx)D.idx={cap:25000,log:[]};D.idx.cap=parseFloat(ge('s101idx').value)||25000;genSteps();syncLinks();sv();notify('Settings saved — 101 Steps regenerated');}
function addIncSrc(){omo('ADD INCOME SOURCE','<div class="fr"><div><label>Source Name</label><input id="isn"></div></div>',()=>{const n=ge('isn').value.trim();if(!n)return;D.inc.push(n);sv();rSet();cmo();notify('Added');});}
function editIncSrc(i){omo('EDIT INCOME SOURCE',`<div class="fr"><div><label>Source Name</label><input id="isn" value="${D.inc[i]}"></div></div>`,()=>{D.inc[i]=ge('isn').value.trim();sv();rSet();cmo();notify('Updated');});}
function delIncSrc(i){if(!confirm('Delete?'))return;D.inc.splice(i,1);sv();rSet();}
function addExpCat(){omo('ADD EXPENSE CATEGORY','<div class="fr"><div><label>Category Name</label><input id="ecn"></div></div>',()=>{const n=ge('ecn').value.trim();if(!n)return;D.exp.push(n);sv();rSet();cmo();notify('Added');});}
function editExpCat(i){omo('EDIT CATEGORY',`<div class="fr"><div><label>Name</label><input id="ecn" value="${D.exp[i]}"></div></div>`,()=>{D.exp[i]=ge('ecn').value.trim();sv();rSet();cmo();notify('Updated');});}
function delExpCat(i){if(!confirm('Delete?'))return;D.exp.splice(i,1);sv();rSet();}
function addQuote(){omo('ADD QUOTE','<div class="fr"><div><label>Your Quote (from the soul)</label><textarea id="qtext" rows="3" style="resize:none" placeholder="Write from your truth..."></textarea></div></div>',()=>{const q=ge('qtext').value.trim();if(!q)return;if(!D.quotes)D.quotes=[];D.quotes.push(q);sv();rSet();cmo();notify('Quote added');});}
function editQuote(i){omo('EDIT QUOTE',`<div class="fr"><div><label>Quote</label><textarea id="qtext" rows="3" style="resize:none">${D.quotes[i]}</textarea></div></div>`,()=>{D.quotes[i]=ge('qtext').value.trim();sv();rSet();cmo();notify('Updated');});}
function delQuote(i){if(!confirm('Delete?'))return;D.quotes.splice(i,1);sv();rSet();}
function expData(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ssjarvis_backup_'+td()+'.json';a.click();notify('Exported');}
function impData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{D=JSON.parse(ev.target.result);sv();location.reload();}catch{notify('Invalid file',true);}};r.readAsText(f);}
function resetConfirm(){omo('CONFIRM RESET — PERMANENT',`<div class="card" style="border-color:var(--rd);margin-bottom:12px"><div style="color:var(--rd);font-weight:700;margin-bottom:8px">⚠ ALL DATA WILL BE DELETED PERMANENTLY</div><div class="txs">This cannot be undone. All transactions, trades, goals, settings — everything will be gone.</div></div><div class="fr"><div><label>Enter your password to confirm</label><input type="password" id="rdpwd"></div></div><div class="fr"><div><label>Type RESET in capital letters</label><input id="rdword" placeholder="RESET"></div></div>`,()=>{if(ge('rdpwd').value!==D.pwd)return notify('Wrong password',true);if(ge('rdword').value!=='RESET')return notify('Type RESET in capitals',true);localStorage.removeItem('ssjv3');location.reload();});}
// ── BOOT ──
ld();ge('pi').focus();
</script>
</body>
</html>
